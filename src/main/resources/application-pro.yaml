spring:
    datasource:
        url: ${MARIADB_URL}
        username: ${MARIADB_USER}
        password: ${MARIADB_PASSWORD}
        driver-class-name: org.mariadb.jdbc.Driver

    flyway:
        enabled: true

    jpa:
        hibernate:
            ddl-auto: none
        properties:
            hibernate:
                dialect: org.hibernate.dialect.MariaDBDialect